<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SiteSense-AR — Professional AEC Overlay</title>
    <link rel="stylesheet" href="./src/style.css">
</head>
<body>
    <!-- AR Status Indicator -->
    <div id="status-bar">
        <div class="status-dot"></div>
        <span>SiteSense v1.0 — Global BIM Verifier</span>
    </div>

    <!-- Scanning Visualizer -->
    <div id="scanning-overlay"></div>

    <!-- Main Scene Container -->
    <div id="canvas-container"></div>

    <!-- Glassmorphic UI Controls -->
    <div id="ui-controls">
        <div class="control-row">
            <span style="opacity: 0.6; font-size: 14px;">Active Model: Structural_L01.glb</span>
        </div>
        
        <button id="start-ar" class="btn-main">Initialize AR Session</button>
        
        <div class="secondary-actions">
            <button id="toggle-xray" class="btn-secondary">Enable X-Ray</button>
            <button id="reset-origin" class="btn-secondary">Reset Alignment</button>
        </div>

        <div style="font-size: 11px; opacity: 0.4; text-align: center; margin-top: 8px;">
            Optimized for WebXR | Powered by Three.js
        </div>
    </div>

    <!-- Main Entry Script -->
    <script type="module" src="./src/main.js"></script>
</body>
</html>
